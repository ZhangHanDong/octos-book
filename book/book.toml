[book]
authors = ["Zhang Alex"]
language = "zh"
multilingual = false
src = "src"
title = "构建 AI Agent OS：octos 架构与实现"
description = "基于 octos 源码的 AI Agent 操作系统架构解析，DDIA 风格"

[build]
build-dir = "book"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
additional-js = ["mermaid.min.js", "mermaid-init.js", "language-switcher.js"]
additional-css = ["language-switcher.css"]
git-repository-url = "https://github.com/ZhangHanDong/octos-book"

[output.html.search]
enable = true
